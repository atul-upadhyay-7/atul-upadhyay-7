name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch real contribution data
        run: python scripts/fetch_contributions.py

      - name: Render contribution heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Regenerate neofetch info card
        run: python scripts/make_info_card.py

      - name: Regenerate self-hosted stats card
        run: python scripts/make_stats_card.py

      - name: Commit and push updated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg info-card.svg stats-card.svg"
